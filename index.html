<!DOCTYPE html>
<html lang="pt">

<head>

  <meta charset="UTF-8">

  <meta name="viewport"
  content="width=device-width, initial-scale=1.0">

  <title>LUXORA</title>

  <link rel="stylesheet" href="style.css">

  <script
  src="https://kit.fontawesome.com/7b9c0e1c1f.js"
  crossorigin="anonymous"></script>

</head>

<body>

  <header class="hero">

    <nav class="navbar">

      <div class="logo">
        LUXORA
      </div>

      <ul>

        <li>
          <a href="#cars">
            Carros
          </a>
        </li>

        <li>
          <a href="#homes">
            Casas
          </a>
        </li>

        <li>
          <a href="#tech">
            Tecnologia
          </a>
        </li>

        <li>
          <a href="#fashion">
            Moda
          </a>
        </li>

      </ul>

      <div class="cart">

        <i class="fa-solid fa-cart-shopping"></i>

        <span id="cartCount">
          0
        </span>

      </div>

    </nav>

    <div class="heroContent">

      <h1>
        LUXORA
      </h1>

      <p>
        Marketplace premium futurista
      </p>

      <button onclick="scrollToSection()">
        Explorar Agora
      </button>

    </div>

  </header>

  <section class="section" id="cars">

    <h2>
      Carros Premium
    </h2>

    <div class="products" id="carsProducts"></div>

  </section>

  <section class="section dark" id="homes">

    <h2>
      Casas de Luxo
    </h2>

    <div class="products" id="homesProducts"></div>

  </section>

  <section class="section" id="tech">

    <h2>
      Tecnologia
    </h2>

    <div class="products" id="techProducts"></div>

  </section>

  <section class="section dark" id="fashion">

    <h2>
      Moda Premium
    </h2>

    <div class="products" id="fashionProducts"></div>

  </section>

  <footer>

    <h3>
      LUXORA
    </h3>

    <p>
      Projeto premium de demonstração
    </p>

  </footer>

  <script src="script.js"></script>

</body>
</html>
